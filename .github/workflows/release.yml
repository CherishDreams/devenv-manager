name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App
        run: pnpm tauri build

      - name: Prepare release assets
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          TAG_VERSION="${GITHUB_REF_NAME}"
          # Read actual build version from tauri.conf.json (source of truth for filenames)
          BUILD_VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")

          # NSIS installer (filename uses build version from tauri.conf.json)
          cp "src-tauri/target/release/bundle/nsis/DevEnvManager_${BUILD_VERSION}_x64-setup.exe" \
            "release-assets/DevEnvManager-${TAG_VERSION}-x64-setup.exe"

          # Portable: zip the standalone exe (-ep strips all directory paths from archive)
          7z a -ep "release-assets/DevEnvManager-${TAG_VERSION}-x64-portable.zip" \
            "src-tauri/target/release/env-manager.exe"

          echo "Release assets prepared:"
          ls -la release-assets/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'DevEnv Manager ${{ github.ref_name }}'
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*
